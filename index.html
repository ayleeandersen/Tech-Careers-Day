<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Careers Day</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Lato', sans-serif;
            background: linear-gradient(135deg, #3C3489 0%, #7F77DD 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            color: white;
        }

        .logo {
            font-family: 'Cinzel', serif;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .tagline {
            font-size: 1.1em;
            opacity: 0.9;
            font-style: italic;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .tab-button {
            font-family: 'Cinzel', serif;
            font-size: 1.1em;
            padding: 12px 30px;
            border: none;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            cursor: pointer;
            border-radius: 25px;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .tab-button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .tab-button.active {
            background: white;
            color: #3C3489;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
        }

        /* Quiz Styles */
        .quiz-container {
            max-width: 700px;
            margin: 0 auto;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            margin-bottom: 40px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #3C3489 0%, #7F77DD 100%);
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        .question {
            margin-bottom: 30px;
        }

        .question-number {
            font-family: 'Cinzel', serif;
            font-size: 0.9em;
            color: #7F77DD;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .question-text {
            font-family: 'Cinzel', serif;
            font-size: 1.4em;
            margin-bottom: 20px;
            color: #3C3489;
        }

        .answers {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .answer-option {
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
            font-size: 1em;
            text-align: left;
        }

        .answer-option:hover {
            border-color: #7F77DD;
            background: #f8f7ff;
        }

        .answer-option.selected {
            border-color: #3C3489;
            background: #3C3489;
            color: white;
        }

        .quiz-button {
            font-family: 'Cinzel', serif;
            font-size: 1.1em;
            padding: 15px 40px;
            background: linear-gradient(135deg, #3C3489 0%, #7F77DD 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 30px;
            transition: all 0.3s ease;
            width: 100%;
        }

        .quiz-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(63, 52, 137, 0.4);
        }

        .quiz-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* House Result Card */
        .house-result {
            animation: fadeIn 0.5s ease;
            padding: 50px 40px;
            border-radius: 15px;
        }

        .house-emoji {
            font-size: 4em;
            margin-bottom: 20px;
            display: block;
        }

        .house-name {
            font-family: 'Cinzel', serif;
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 900;
            color: white;
        }

        .house-house {
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 20px;
            font-style: italic;
        }

        .house-tagline {
            font-family: 'Cinzel', serif;
            font-size: 1.3em;
            font-weight: 700;
            margin-bottom: 20px;
            font-style: italic;
            color: rgba(255, 255, 255, 0.95);
        }

        .house-description {
            font-size: 1.05em;
            line-height: 1.6;
            margin-bottom: 30px;
            color: rgba(255, 255, 255, 0.9);
        }

        .jobs-label {
            font-family: 'Cinzel', serif;
            font-size: 1.1em;
            font-weight: 700;
            margin-bottom: 15px;
            color: rgba(255, 255, 255, 0.95);
        }

        .job-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 30px;
        }

        .job-pill {
            padding: 10px 18px;
            border-radius: 20px;
            font-size: 0.95em;
            font-weight: 500;
            color: white;
            background: rgba(255, 255, 255, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        /* House colors */
        .house-visionary { background: linear-gradient(135deg, #9B59B6 0%, #C39BD3 100%); }
        .house-architect { background: linear-gradient(135deg, #3498DB 0%, #5DADE2 100%); }
        .house-guardian { background: linear-gradient(135deg, #E67E22 0%, #F39C12 100%); }
        .house-oracle { background: linear-gradient(135deg, #1D9E75 0%, #27AE60 100%); }

        .try-again-button {
            font-family: 'Cinzel', serif;
            font-size: 1.1em;
            padding: 12px 40px;
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .try-again-button:hover {
            border-color: white;
            background: rgba(255, 255, 255, 0.25);
        }

        /* App Generator Styles */
        .generator-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .generator-bg {
            background: linear-gradient(135deg, #1D9E75 0%, #085041 100%);
        }

        .generator-bg .card {
            background: white;
        }

        .prompt-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 25px;
        }

        .chip {
            padding: 10px 18px;
            background: linear-gradient(135deg, #1D9E75 0%, #085041 100%);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.95em;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .chip:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(29, 158, 117, 0.3);
        }

        .api-key-section {
            background: #f0f0f0;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .api-key-input {
            flex: 1;
            min-width: 200px;
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 0.95em;
            transition: border-color 0.3s ease;
        }

        .api-key-input:focus {
            outline: none;
            border-color: #1D9E75;
        }

        .api-key-input::placeholder {
            color: #999;
        }

        .api-key-button {
            padding: 10px 20px;
            background: linear-gradient(135deg, #1D9E75 0%, #085041 100%);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .api-key-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 2px 8px rgba(29, 158, 117, 0.3);
        }

        .api-key-button.set {
            background: #085041;
        }

        .textarea-label {
            font-family: 'Cinzel', serif;
            font-size: 1.2em;
            margin-bottom: 12px;
            display: block;
            color: #333;
            font-weight: 700;
        }

        textarea {
            width: 100%;
            min-height: 150px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-family: 'Lato', sans-serif;
            font-size: 1em;
            resize: vertical;
            transition: border-color 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: #1D9E75;
        }

        .generate-button {
            font-family: 'Cinzel', serif;
            font-size: 1.1em;
            padding: 15px 40px;
            background: linear-gradient(135deg, #1D9E75 0%, #085041 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
            width: 100%;
        }

        .generate-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(29, 158, 117, 0.4);
        }

        .generate-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-style: italic;
            color: #888;
        }

        .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #1D9E75;
            border-top: 3px solid transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .result-box {
            background: white;
            border: 2px solid #1D9E75;
            padding: 30px;
            border-radius: 10px;
            margin-top: 30px;
            white-space: pre-wrap;
            font-family: 'Lato', sans-serif;
            line-height: 1.7;
            animation: fadeIn 0.5s ease;
            color: #333;
        }

        .error-message {
            color: #c0392b;
            margin-top: 15px;
            padding: 15px;
            background: #fadbd8;
            border-radius: 5px;
            display: none;
            border-left: 4px solid #c0392b;
        }

        .error-message.show {
            display: block;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 20px 15px;
            }

            .logo {
                font-size: 2em;
            }

            .card {
                padding: 25px;
            }

            .house-name {
                font-size: 2em;
            }

            .question-text {
                font-size: 1.2em;
            }

            .prompt-chips {
                flex-direction: column;
            }

            .chip {
                width: 100%;
            }

            .api-key-section {
                flex-direction: column;
            }

            .api-key-input {
                width: 100%;
            }

            .api-key-button {
                width: 100%;
            }

            .tabs {
                flex-direction: column;
                gap: 8px;
            }

            .tab-button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">⚡ Tech Careers Day</div>
            <div class="tagline">Discover your perfect tech house</div>
        </header>

        <div class="tabs">
            <button class="tab-button active" onclick="switchTab('quiz')">🪄 Tech House Sorting</button>
            <button class="tab-button" onclick="switchTab('generator')">💡 App Idea Generator</button>
        </div>

        <!-- Quiz Tab -->
        <div id="quiz" class="tab-content active">
            <div class="card quiz-container">
                <div id="quizSection">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <form id="quizForm">
                        <div id="questionsContainer"></div>
                        <button type="submit" class="quiz-button" id="submitBtn">Reveal My House</button>
                    </form>
                </div>
                <div id="resultSection" style="display: none;">
                    <div id="houseResult"></div>
                </div>
            </div>
        </div>

        <!-- Generator Tab -->
        <div id="generator" class="tab-content generator-bg">
            <div class="card generator-container">
                <div class="api-key-section">
                    <input type="password" id="apiKeyInput" class="api-key-input" placeholder="Enter your Anthropic API key (kept in memory for this session)">
                    <button type="button" class="api-key-button" onclick="setApiKey()">Set Key</button>
                </div>
                <div id="generatorSection">
                    <div class="prompt-chips" id="promptChips"></div>
                    <label class="textarea-label">Describe your app idea:</label>
                    <textarea id="ideaTextarea" placeholder="What's your app idea? What does it do? Who would use it?"></textarea>
                    <button type="button" class="generate-button" onclick="generateAppIdea()">Generate My App</button>
                    <div id="errorMessage" class="error-message"></div>
                    <div id="resultContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Quiz Data
        const houses = {
            visionary: {
                name: 'House Visionary',
                emoji: '🎨',
                color: 'house-visionary',
                tagline: 'Builders of the beautiful & intuitive',
                description: 'Visionaries are the artists and designers of the tech world. They craft beautiful user interfaces, stunning web designs, and engaging experiences that make people fall in love with apps. If you love making things look amazing and thinking about how people interact with apps, this is your house.'
            },
            architect: {
                name: 'House Architect',
                emoji: '⚙️',
                color: 'house-architect',
                tagline: 'Engineers of logic & order',
                description: 'Architects are the builders behind the scenes. They design databases, create powerful servers, build APIs, and engineer systems that handle millions of users. If you love solving complex problems and making sure everything runs smoothly, this is your house.'
            },
            guardian: {
                name: 'House Guardian',
                emoji: '🛡️',
                color: 'house-guardian',
                tagline: 'Protectors of the digital realm',
                description: 'Guardians are the defenders of the digital world. They find and fix security vulnerabilities, protect apps from hackers, and keep data safe from cyber attacks. If you love problem-solving and protecting people from danger, this is your house.'
            },
            oracle: {
                name: 'House Oracle',
                emoji: '📊',
                color: 'house-oracle',
                tagline: 'Seekers of patterns & truth',
                description: 'Oracles are the data detectives and AI pioneers. They analyze massive datasets to find hidden patterns, build AI systems that learn and adapt, and predict the future using data. If you love uncovering insights and finding hidden patterns, this is your house.'
            }
        };

        const houseJobs = {
            visionary: ['UI/UX Designer', 'Frontend Developer', 'Web Designer', 'Game Designer', 'App Developer'],
            architect: ['Backend Developer', 'Database Engineer', 'API Developer', 'Software Architect', 'DevOps Engineer'],
            guardian: ['Cybersecurity Analyst', 'Ethical Hacker', 'Security Engineer', 'Network Engineer', 'Threat Researcher'],
            oracle: ['Data Scientist', 'AI/ML Engineer', 'Data Analyst', 'Research Scientist', 'Business Intelligence Dev']
        };

        const questions = [
            {
                text: 'You\'re in charge of the school talent show. What\'s your job?',
                answers: [
                    { text: 'Designing posters and stage decorations', house: 'visionary' },
                    { text: 'Scheduling who goes on when and making sure it runs smoothly', house: 'architect' },
                    { text: 'Making sure no one sneaks backstage who shouldn\'t be there', house: 'guardian' },
                    { text: 'Tracking scores and figuring out who the crowd liked most', house: 'oracle' }
                ]
            },
            {
                text: 'Your team is losing at halftime. What do you do?',
                answers: [
                    { text: 'Come up with a hype chant to get everyone fired up', house: 'visionary' },
                    { text: 'Figure out exactly what\'s going wrong in the play strategy', house: 'architect' },
                    { text: 'Notice the other team keeps doing something sneaky and call it out', house: 'guardian' },
                    { text: 'Look at the stats and figure out which player should take more shots', house: 'oracle' }
                ]
            },
            {
                text: 'You find $50. What do you do with it?',
                answers: [
                    { text: 'Buy something that makes your room look awesome', house: 'visionary' },
                    { text: 'Save it and make a detailed plan for exactly how to use it', house: 'architect' },
                    { text: 'Research whether what you want to buy is actually legit first', house: 'guardian' },
                    { text: 'Track your spending so you always know where it goes', house: 'oracle' }
                ]
            },
            {
                text: 'Pick your dream weekend project:',
                answers: [
                    { text: 'Redecorate your room or make something creative', house: 'visionary' },
                    { text: 'Build something that actually works — a shelf, a gadget, anything', house: 'architect' },
                    { text: 'Take something apart to figure out how it works', house: 'guardian' },
                    { text: 'Keep stats on something you love — sports, games, music', house: 'oracle' }
                ]
            },
            {
                text: 'Your group chat is a mess. Everyone\'s fighting. You:',
                answers: [
                    { text: 'Make a really funny meme that breaks the tension', house: 'visionary' },
                    { text: 'Set some ground rules so things stop going sideways', house: 'architect' },
                    { text: 'Figure out who actually started it and why', house: 'guardian' },
                    { text: 'Stay quiet and observe until you know exactly what\'s going on', house: 'oracle' }
                ]
            },
            {
                text: 'If you had to enter a competition, which would you pick?',
                answers: [
                    { text: 'An art, design, or fashion contest', house: 'visionary' },
                    { text: 'A robotics or engineering challenge', house: 'architect' },
                    { text: 'An escape room or mystery competition', house: 'guardian' },
                    { text: 'A trivia tournament or math olympiad', house: 'oracle' }
                ]
            }
        ];

        const promptStarters = [
            'An app that helps me...',
            'A game where you can...',
            'An app for my school that...',
            'A robot or gadget that...',
            'An app for pets that...',
            'Something totally wild, like...'
        ];

        // Global state
        let apiKey = null;
        let selectedAnswers = {};

        // Initialize quiz
        function initializeQuiz() {
            renderQuestions();
            updateProgressBar();
        }

        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';

            questions.forEach((q, idx) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question';
                questionDiv.innerHTML = `
                    <div class="question-number">Question ${idx + 1} of ${questions.length}</div>
                    <div class="question-text">${q.text}</div>
                    <div class="answers">
                        ${q.answers.map((a, aIdx) => `
                            <button
                                type="button"
                                class="answer-option ${selectedAnswers[idx] === aIdx ? 'selected' : ''}"
                                onclick="selectAnswer(${idx}, ${aIdx})"
                            >${a.text}</button>
                        `).join('')}
                    </div>
                `;
                container.appendChild(questionDiv);
            });
        }

        function selectAnswer(questionIdx, answerIdx) {
            selectedAnswers[questionIdx] = answerIdx;
            updateProgressBar();
            renderQuestions();
        }

        function updateProgressBar() {
            const answered = Object.keys(selectedAnswers).length;
            const progress = (answered / questions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        document.getElementById('quizForm')?.addEventListener('submit', (e) => {
            e.preventDefault();
            if (Object.keys(selectedAnswers).length === questions.length) {
                showResult();
            }
        });

        function showResult() {
            const scores = { visionary: 0, architect: 0, guardian: 0, oracle: 0 };

            Object.entries(selectedAnswers).forEach(([qIdx, aIdx]) => {
                const house = questions[qIdx].answers[aIdx].house;
                scores[house]++;
            });

            const winner = Object.entries(scores).reduce((a, b) => a[1] > b[1] ? a : b)[0];
            const houseData = houses[winner];
            const jobs = houseJobs[winner];

            const resultDiv = document.getElementById('houseResult');
            resultDiv.className = `house-result ${houseData.color}`;
            resultDiv.innerHTML = `
                <span class="house-emoji">${houseData.emoji}</span>
                <div class="house-name">${houseData.name}</div>
                <div class="house-house">Your Perfect Tech House</div>
                <div class="house-tagline">"${houseData.tagline}"</div>
                <div class="house-description">${houseData.description}</div>
                <div class="jobs-label">Career Paths:</div>
                <div class="job-pills">
                    ${jobs.map(job => `<div class="job-pill">${job}</div>`).join('')}
                </div>
                <button class="try-again-button" onclick="resetQuiz()">Try Again</button>
            `;

            document.getElementById('quizSection').style.display = 'none';
            document.getElementById('resultSection').style.display = 'block';
        }

        function resetQuiz() {
            selectedAnswers = {};
            document.getElementById('quizSection').style.display = 'block';
            document.getElementById('resultSection').style.display = 'none';
            renderQuestions();
            updateProgressBar();
        }

        // Initialize prompt chips
        function initializeGenerator() {
            const container = document.getElementById('promptChips');
            container.innerHTML = promptStarters.map(prompt => `
                <button type="button" class="chip" onclick="insertPrompt('${prompt}')">${prompt}</button>
            `).join('');
        }

        function insertPrompt(prompt) {
            const textarea = document.getElementById('ideaTextarea');
            textarea.value = prompt;
            textarea.focus();
        }

        function setApiKey() {
            const input = document.getElementById('apiKeyInput');
            const key = input.value.trim();

            if (!key) {
                showError('Please enter an API key');
                return;
            }

            apiKey = key;
            input.value = '';
            input.placeholder = '✓ API key set for this session';

            const btn = event.target;
            btn.classList.add('set');
            btn.textContent = '✓ Key Set';
        }

        function loadKeyFromUrl() {
            const params = new URLSearchParams(window.location.search);
            const urlKey = params.get('key');

            if (urlKey) {
                apiKey = urlKey;
                const section = document.getElementById('apiKeySection');
                section.innerHTML = '<div style="color: #333; font-weight: 500;">✓ API key loaded from link</div>';
            }
        }

        async function generateAppIdea() {
            const idea = document.getElementById('ideaTextarea').value.trim();

            if (!idea) {
                showError('Please describe your app idea');
                return;
            }

            if (!apiKey) {
                showError('Please set your API key first');
                return;
            }

            const resultContainer = document.getElementById('resultContainer');
            resultContainer.innerHTML = '<div class="loading"><div class="spinner"></div>Generating your app...</div>';
            clearError();

            try {
                const response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': apiKey,
                        'anthropic-version': '2023-06-01'
                    },
                    body: JSON.stringify({
                        model: 'claude-sonnet-4-20250514',
                        max_tokens: 1000,
                        system: `You are a fun, encouraging tech mentor talking to middle school students (ages 11-14) who are learning about software development careers. When a student describes an app idea, respond with enthusiasm and structure your response exactly like this (use these exact labels on their own lines):

APP NAME: (a creative, catchy name for their app)
WHAT IT DOES: (1-2 sentences, kid-friendly)
COOL FEATURES: (3 bullet points starting with -, each one sentence)
WHO BUILDS IT: (name 1-2 real software developer job titles that would work on this)
FUN FACT: (one surprising, encouraging fact about apps or software development)

Keep the total response under 200 words. Be enthusiastic but not over-the-top. Never say "Great idea!" as your opener.`,
                        messages: [
                            {
                                role: 'user',
                                content: idea
                            }
                        ]
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error?.message || 'API request failed');
                }

                const data = await response.json();
                const result = data.content[0].text;

                resultContainer.innerHTML = `<div class="result-box">${escapeHtml(result)}</div>`;
            } catch (error) {
                showError('Error: ' + error.message);
                resultContainer.innerHTML = '';
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
        }

        function clearError() {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.classList.remove('show');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function switchTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));

            // Show selected tab
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');

            // Initialize if needed
            if (tabName === 'quiz') {
                if (!document.getElementById('questionsContainer').innerHTML) {
                    initializeQuiz();
                }
            } else if (tabName === 'generator') {
                if (!document.getElementById('promptChips').innerHTML) {
                    initializeGenerator();
                }
            }
        }

        // Initialize on load
        window.addEventListener('load', () => {
            loadKeyFromUrl();
            initializeQuiz();
            initializeGenerator();
        });
    </script>
</body>
</html>
